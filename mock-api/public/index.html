<!DOCTYPE html>
<html>
<head>
  <title>Posts Dashboard</title>
  <style>
    body {
      font-family: Arial;
      margin: 40px;
      background: #f5f5f5;
    }

    h1 {
      color: #333;
    }

    #status {
      margin-bottom: 20px;
      padding: 10px;
      border-radius: 5px;
      background: #e0e0e0;
    }

    .post {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .highlight {
      border: 2px solid green;
      background: #eaffea;
    }
  </style>
</head>
<body>

  <h1>📋 Posts Dashboard</h1>

  <div id="status">⏳ Loading posts...</div>

  <div id="posts"></div>

  <script src="app.js"></script>
</body>
</html>
